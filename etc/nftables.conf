table inet filter {
	chain input {
		type filter hook input priority filter; policy drop;
		ct state invalid drop comment "drop invalid packets"
		ct state { established, related } accept comment "allow established/related"
		iif "lo" accept comment "allow loopback"
		iifname "tun*" accept comment "allow Happ TUN"
		meta l4proto { icmp, ipv6-icmp } accept comment "allow ICMP"
		tcp dport 22 ct state new limit rate 10/minute burst 5 packets counter packets 0 bytes 0 accept comment "allow SSH (rate limited)"
		tcp dport 53 accept comment "allow DNS TCP"
		udp dport 53 accept comment "allow DNS UDP"
		tcp dport { 10808, 11111 } accept comment "allow xray"
		udp dport { 10808, 11111 } accept comment "allow xray UDP"
		tcp flags & (fin | syn | rst | psh | ack | urg) == fin | psh | urg log prefix "Nftables XMAS: " drop comment "XMAS scan"
		tcp flags & (fin | syn) == fin | syn log prefix "Nftables SYN/FIN: " drop comment "SYN/FIN scan"
		tcp flags & (syn | rst) == syn | rst log prefix "Nftables SYN/RST: " drop comment "SYN/RST scan"
		log prefix "Nftables drop: " limit rate 5/second burst 10 packets counter packets 1 bytes 36
		iifname "tun*" accept
	}

	chain forward {
		type filter hook forward priority filter; policy drop;
		ct state { established, related } accept
		ct state invalid drop
		iif "lo" accept
		iifname "tun*" accept comment "allow Happ TUN forward in"
		oifname "tun*" accept comment "allow Happ TUN forward out"
		iifname "tun*" accept
		oifname "tun*" accept
	}

	chain output {
		type filter hook output priority filter; policy accept;
		oifname "tun*" accept comment "allow Happ TUN output"
		oifname "tun*" accept
	}
}
table inet nat {
	chain prerouting {
		type nat hook prerouting priority dstnat; policy accept;
	}

	chain postrouting {
		type nat hook postrouting priority srcnat; policy accept;
	}
}

